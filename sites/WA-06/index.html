                                                    <div>
                                                        <h3 className="text-2xl font-display font-bold text-slate-900 mb-2">{step.title}</h3>
                                                        <p className="text-lg text-slate-600 leading-relaxed">{step.description}</p>
                                                    </div>
                                                </div>
                                            </motion.div>
                                            {i < arr.length - 1 && (
                                                <motion.div
                                                    initial={{ opacity: 0 }}
                                                    whileInView={{ opacity: 1 }}
                                                    viewport={{ once: true }}
                                                    transition={{ delay: i * 0.1 + 0.2 }}
                                                >
                                                    <LucideIcon name="arrow-down" size={32} className="text-slate-300 animate-bounce" />
                                                </motion.div>
                                            )}
                                        </React.Fragment>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Demo */}
                        <section className="py-24 bg-slate-50 border-y border-slate-100">
                            <div className="container mx-auto max-w-4xl px-6">
                                <motion.section 
                                    initial={{ opacity: 0, y: 20 }}
                                    whileInView={{ opacity: 1, y: 0 }}
                                    viewport={{ once: true }}
                                    className="group"
                                >
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="flex h-10 w-10 items-center justify-center rounded-lg bg-purple-50 text-purple-600 transition-colors group-hover:bg-purple-600 group-hover:text-white">
                                            <LucideIcon name="play" size={20} />
                                        </div>
                                        <h2 className="text-2xl font-display font-bold text-slate-900">Demo</h2>
                                    </div>
                                    <div className="aspect-video overflow-hidden rounded-2xl border border-slate-200 bg-slate-100 shadow-sm">
                                        <iframe
                                            src="https://www.youtube.com/embed/5oStxFr2kZ4"
                                            title="JourneyKeep Demo Video"
                                            className="h-full w-full"
                                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                            allowFullScreen
                                        ></iframe>
                                    </div>
                                </motion.section>
                            </div>
                        </section>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <!-- Required: keep this line so arrow key navigation works -->
    <script src="../../assets/js/nav.js" data-root="../../"></script>
</body>
</html>
